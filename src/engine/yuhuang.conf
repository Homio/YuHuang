## YuHuang 语音输入法配置
#
# 在 fcitx5-configtool 中可图形化编辑此文件
# 修改后需重新加载 fcitx5: fcitx5 -r

[YuHuang]
# Push-to-talk 触发键
# 按住此键期间，麦克风开启并识别语音
# 松开后自动上屏文字
# 支持：Control_R, Control_L, Shift_R, Super_L, Super+Space, F2 等
# Type=Key
# AllowModifierOnly=True
# AllowModifierLess=True
TriggerKey=Control_R

# 检查系统快捷键冲突
# 若触发键与 GNOME/KDE 系统快捷键有冲突，输出警告
# Type=Boolean
CheckConflicts=true

# 后端 Unix Socket 路径
# Python 后端服务监听的 socket 路径
# Type=String
BackendSocket=/tmp/yuhuang-backend.sock

# VAD 静音超时 (毫秒)
# 用户停止说话多久后，判定为一段语音结束
# Type=Integer
# Min=100
# Max=5000
VADSilenceTimeout=800

# ASR 中间结果刷新间隔 (毫秒)
# 语音识别过程中，预编辑文字更新的频率
# Type=Integer
# Min=50
# Max=2000
ASRIntermediateInterval=300

# 麦克风设备名称
# 留空 = 使用系统默认输入设备
# 指定名称 = 使用特定麦克风
# 查看设备: yuhuang-ctl mic
# 快捷设置: yuhuang-ctl mic "<设备名关键词>"
# 修改后即时生效，无需重启后端
# Type=String
AudioDevice=

# ---- LLM 智能优化配置 ----
# 以下配置将通过后端发送给 LLM 服务

# 启用 LLM 优化
# 需配合运行中的 LLM 后端服务 (vLLM/Ollama)
# Type=Boolean
LLMEnabled=false

# LLM API 地址 (OpenAI 兼容)
# Type=String
LLMBaseUrl=http://localhost:8000/v1

# LLM API 密钥
# Type=String
LLMApiKey=token-abc123

# LLM 模型名称
# Type=String
LLMModel=qwen2.5-7b-instruct

# LLM 温度 (0~100, 如 30=0.30)
# 越低越确定，越高越创造性
# Type=Integer
# Min=0
# Max=100
LLMTemperature=30

# LLM 最大输出 Token 数
# Type=Integer
# Min=64
# Max=8192
LLMMaxTokens=2000

# LLM 优化延迟 (毫秒)
# 语音结束后，等待多久再开始 LLM 优化
# 给 ASR 更多时间生成完整结果
# Type=Integer
# Min=0
# Max=5000
LLMOptimizeDelay=500

# LLM 自动上屏延迟 (毫秒)
# LLM 优化完成后，等待多久后自动上屏
# Type=Integer
# Min=0
# Max=3000
LLMAutoCommitDelay=200
